name: Refrescar datos GLP

on:
  schedule:
    - cron: '17 11 * * *'      # ~06:17 Colombia, a diario
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: glp-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --no-audit --no-fund
      - name: Refrescar glp-data.json
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}   # opcional; sin llave, Mont Belvieu se omite
        run: node update-glp-data.js
      - name: Commit si cambió
        run: |
          if git diff --quiet -- glp-data.json; then
            echo "Sin cambios"
          else
            git config user.name  "glp-data-bot"
            git config user.email "actions@users.noreply.github.com"
            git add glp-data.json
            git commit -m "chore: refrescar datos oficiales del GLP"
            git push
          fi
